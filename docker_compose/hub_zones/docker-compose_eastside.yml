name: hub_eastside

services:
  eastside_db:
    image: postgres:14-alpine3.17
    container_name: hub-db-eastside
    volumes:
      - db_eastside:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: hub_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - hub_network

  eastside:
    image: hub-manager-service:latest
    container_name: eastside
    expose:
      - "8081"
    depends_on:
      traefik:
        condition: service_started
      eastside_db:
        condition: service_healthy
    environment:
      HUB_TO_HANDLE: hub_eastside
      INITIALIZE_ON_STARTUP: true
      CHARGER_GATEWAY_URL: http://charger-gateway-eastside:9000
      INITIAL_DELAY_POLL: 5000
      FIXED_DELAY_POLL: 5000

      KAFKA_SERVER: broker:29092
      KAFKA_TOPIC: hub_state

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api

      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_URL: jdbc:postgresql://hub-db-eastside:5432/hub_db
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub-eastside.rule=PathPrefix(`/api/hub_eastside`)"
      - "traefik.http.routers.hub-eastside.entrypoints=web"
      - "traefik.http.services.hub-eastside.loadbalancer.server.port=8081"

      - "traefik.http.middlewares.hub-eastside-replace.replacepathregex.regex=^/api/hub_eastside(.*)"
      - "traefik.http.middlewares.hub-eastside-replace.replacepathregex.replacement=/api/hub$$1"
      - "traefik.http.routers.hub-eastside.middlewares=hub-eastside-replace"
    networks:
      - hub_network

  charger_gateway_eastside:
    image: charger-gateway:latest
    container_name: charger-gateway-eastside
    expose:
      - "9000"
    volumes:
      - ./additional_config/eastside.yml:/app/additional_config/application.yml
    networks:
      - hub_network

  eastside_col1:
    image: charger-manager-service:latest
    container_name: eastside-col1
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: hub_eastside
      CHARGER_TO_HANDLE: hub_eastside_col1

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

  eastside_col2:
    image: charger-manager-service:latest
    container_name: eastside-col2
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: hub_eastside
      CHARGER_TO_HANDLE: hub_eastside_col2

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

volumes:
  db_eastside:

networks:
  hub_network:
    driver: bridge