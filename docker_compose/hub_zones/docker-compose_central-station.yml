name: hub_central_station

services:
  central_station_db:
    image: postgres:14-alpine3.17
    container_name: hub-db-central-station
    volumes:
      - db_central_station:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: hub_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - hub_network

  central_station:
    image: hub-manager-service:latest
    container_name: central_station
    expose:
      - "8081"
    depends_on:
      traefik:
        condition: service_started
      central_station_db:
        condition: service_healthy
    environment:
      HUB_TO_HANDLE: hub_central_station
      INITIALIZE_ON_STARTUP: true
      CHARGER_GATEWAY_URL: http://charger-gateway-central-station:9000
      INITIAL_DELAY_POLL: 5000
      FIXED_DELAY_POLL: 5000

      KAFKA_SERVER: broker:29092
      KAFKA_TOPIC: hub_state

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api

      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_URL: jdbc:postgresql://hub-db-central-station:5432/hub_db
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub-central-station.rule=PathPrefix(`/api/hub_central_station`)"
      - "traefik.http.routers.hub-central-station.entrypoints=web"
      - "traefik.http.services.hub-central-station.loadbalancer.server.port=8081"

      - "traefik.http.middlewares.hub-central-station-replace.replacepathregex.regex=^/api/hub_central_station(.*)"
      - "traefik.http.middlewares.hub-central-station-replace.replacepathregex.replacement=/api/hub$$1"
      - "traefik.http.routers.hub-central-station.middlewares=hub-central-station-replace"
    networks:
      - hub_network

  charger_gateway_central_station:
    image: charger-gateway:latest
    container_name: charger-gateway-central-station
    expose:
      - "9000"
    volumes:
      - ./additional_config/central_station.yml:/app/additional_config/application.yml
    networks:
      - hub_network

  central_station_col1:
    image: charger-manager-service:latest
    container_name: central-station-col1
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: hub_central_station
      CHARGER_TO_HANDLE: hub_central_station_col1

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

  central_station_col2:
    image: charger-manager-service:latest
    container_name: central-station-col2
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: hub_central_station
      CHARGER_TO_HANDLE: hub_central_station_col2

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

volumes:
  db_central_station:

networks:
  hub_network:
    driver: bridge