name: Berlin_Heinrich_Heine

services:
  berlin_heinrich_heine_db:
    image: postgres:14-alpine3.17
    container_name: berlin-heinrich-heine-db
    volumes:
      - db_berlin_heinrich_heine:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: hub_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - hub_network

  berlin_heinrich_heine:
    image: hub-manager-service:latest
    container_name: berlin-heinrich-heine-hub
    expose:
      - "8081"
    depends_on:
      traefik:
        condition: service_started
      berlin_heinrich_heine_db:
        condition: service_healthy
      init_service:
        condition: service_completed_successfully
    environment:
      HUB_TO_HANDLE: Berlin_Heinrich_Heine
      INITIALIZE_ON_STARTUP: true
      CHARGER_GATEWAY_URL: http://berlin-heinrich-heine-charger-gateway:9000
      INITIAL_DELAY_POLL: 5000
      FIXED_DELAY_POLL: 5000

      KAFKA_SERVER: broker:29092
      KAFKA_TOPIC: hub_state

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api

      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_URL: jdbc:postgresql://berlin-heinrich-heine-db:5432/hub_db
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.Berlin_Heinrich_Heine.rule=PathPrefix(`/api/Berlin_Heinrich_Heine`)"
      - "traefik.http.routers.Berlin_Heinrich_Heine.entrypoints=web"
      - "traefik.http.services.Berlin_Heinrich_Heine.loadbalancer.server.port=8081"

      - "traefik.http.middlewares.Berlin_Heinrich_Heine-replace.replacepathregex.regex=^/api/Berlin_Heinrich_Heine(.*)"
      - "traefik.http.middlewares.Berlin_Heinrich_Heine-replace.replacepathregex.replacement=/api/hub$$1"
      - "traefik.http.routers.Berlin_Heinrich_Heine.middlewares=Berlin_Heinrich_Heine-replace"
    networks:
      - hub_network

  berlin_heinrich_heine_charger_gateway:
    image: charger-gateway:latest
    container_name: berlin-heinrich-heine-charger-gateway
    expose:
      - "9000"
    volumes:
      - ./gateway_config/berlin_heinrich_heine.yml:/app/additional_config/application.yml
    networks:
      - hub_network

  berlin_heinrich_heine_col1:
    image: charger-manager-service:latest
    container_name: berlin-heinrich-heine-col1
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
      init_service:
        condition: service_completed_successfully
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: Berlin_Heinrich_Heine
      CHARGER_TO_HANDLE: Berlin_Heinrich_Heine_col1
      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

