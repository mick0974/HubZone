name: Berlin_Hospital

services:
  berlin_hospital_db:
    image: postgres:14-alpine3.17
    container_name: berlin-hospital-db
    volumes:
      - db_berlin_hospital:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: hub_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - hub_network

  berlin_hospital:
    image: hub-manager-service:latest
    container_name: berlin-hospital-hub
    expose:
      - "8081"
    depends_on:
      traefik:
        condition: service_started
      berlin_hospital_db:
        condition: service_healthy
      init_service:
        condition: service_completed_successfully
    environment:
      HUB_TO_HANDLE: Berlin_Hospital
      INITIALIZE_ON_STARTUP: true
      CHARGER_GATEWAY_URL: http://berlin-hospital-charger-gateway:9000
      INITIAL_DELAY_POLL: 5000
      FIXED_DELAY_POLL: 5000

      KAFKA_SERVER: broker:29092
      KAFKA_TOPIC: hub_state

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api

      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_URL: jdbc:postgresql://berlin-hospital-db:5432/hub_db
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.Berlin_Hospital.rule=PathPrefix(`/api/Berlin_Hospital`)"
      - "traefik.http.routers.Berlin_Hospital.entrypoints=web"
      - "traefik.http.services.Berlin_Hospital.loadbalancer.server.port=8081"

      - "traefik.http.middlewares.Berlin_Hospital-replace.replacepathregex.regex=^/api/Berlin_Hospital(.*)"
      - "traefik.http.middlewares.Berlin_Hospital-replace.replacepathregex.replacement=/api/hub$$1"
      - "traefik.http.routers.Berlin_Hospital.middlewares=Berlin_Hospital-replace"
    networks:
      - hub_network

  berlin_hospital_charger_gateway:
    image: charger-gateway:latest
    container_name: berlin-hospital-charger-gateway
    expose:
      - "9000"
    volumes:
      - ./gateway_config/berlin_hospital.yml:/app/additional_config/application.yml
    networks:
      - hub_network

  berlin_hospital_col1:
    image: charger-manager-service:latest
    container_name: berlin-hospital-col1
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
      init_service:
        condition: service_completed_successfully
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: Berlin_Hospital
      CHARGER_TO_HANDLE: Berlin_Hospital_col1
      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

