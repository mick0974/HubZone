name: Berlin_Humboldthain

services:
  berlin_humboldthain_db:
    image: postgres:14-alpine3.17
    container_name: berlin-humboldthain-db
    volumes:
      - db_berlin_humboldthain:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: hub_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - hub_network

  berlin_humboldthain:
    image: hub-manager-service:latest
    container_name: berlin-humboldthain-hub
    expose:
      - "8081"
    depends_on:
      traefik:
        condition: service_started
      berlin_humboldthain_db:
        condition: service_healthy
      init_service:
        condition: service_completed_successfully
    environment:
      HUB_TO_HANDLE: Berlin_Humboldthain
      INITIALIZE_ON_STARTUP: true
      CHARGER_GATEWAY_URL: http://berlin-humboldthain-charger-gateway:9000
      INITIAL_DELAY_POLL: 5000
      FIXED_DELAY_POLL: 5000

      KAFKA_SERVER: broker:29092
      KAFKA_TOPIC: hub_state

      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api

      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_URL: jdbc:postgresql://berlin-humboldthain-db:5432/hub_db
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.Berlin_Humboldthain.rule=PathPrefix(`/api/Berlin_Humboldthain`)"
      - "traefik.http.routers.Berlin_Humboldthain.entrypoints=web"
      - "traefik.http.services.Berlin_Humboldthain.loadbalancer.server.port=8081"

      - "traefik.http.middlewares.Berlin_Humboldthain-replace.replacepathregex.regex=^/api/Berlin_Humboldthain(.*)"
      - "traefik.http.middlewares.Berlin_Humboldthain-replace.replacepathregex.replacement=/api/hub$$1"
      - "traefik.http.routers.Berlin_Humboldthain.middlewares=Berlin_Humboldthain-replace"
    networks:
      - hub_network

  berlin_humboldthain_charger_gateway:
    image: charger-gateway:latest
    container_name: berlin-humboldthain-charger-gateway
    expose:
      - "9000"
    volumes:
      - ./gateway_config/berlin_humboldthain.yml:/app/additional_config/application.yml
    networks:
      - hub_network

  berlin_humboldthain_col1:
    image: charger-manager-service:latest
    container_name: berlin-humboldthain-col1
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
      init_service:
        condition: service_completed_successfully
    environment:
      INITIALIZE_ON_STARTUP: true
      HUB_TO_HANDLE: Berlin_Humboldthain
      CHARGER_TO_HANDLE: Berlin_Humboldthain_col1
      SIMULATION_API_BASE_URL: http://host.docker.internal:8090/api
      SIMULATION_WEBSOCKET_URL: ws://host.docker.internal:8090/ws/simulation
    restart: unless-stopped
    networks:
      - hub_network

